[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install -g pnpm@10 --ignore-scripts",
  "pnpm install --no-frozen-lockfile"
]

[phases.build]
cmds = ["BASE_PATH=/ pnpm --filter @workspace/courier-app run build"]

[start]
cmd = "npx serve -s artifacts/courier-app/dist/public -l $PORT"
