kind = "web"
previewPath = "/"
title = "Shipvora Courier Tracking"
version = "1.0.0"
id = "artifacts/courier-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19963

[services.development]
run = "pnpm --filter @workspace/courier-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/courier-app", "run", "build" ]
publicDir = "artifacts/courier-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19963"
BASE_PATH = "/"
